general {
    base_exp_dir = ./exp/CASE_NAME/womask
    exp_name = CASE_NAME
    recording = [
        ./,
        ./models
    ]
}

dataset {
    data_dir = ./public_data/CASE_NAME/
    render_cameras_name = cameras_sphere.npz
    object_cameras_name = cameras_sphere.npz
    init_pose = True
    init_intrinsic = True
    learn_pose = True
    learn_intrinsic = False
    noise_magnitude = 0.1
}

train {
    learning_rate = 5e-4
    learning_rate_alpha = 0.05
    end_iter = 300000

    learn_scale = True
    learn_shift = True
    fix_scaleN = True

    batch_size = 1024
    validate_resolution_level = 4
    warm_up_end = 5000
    anneal_end = 50000
    use_white_bkgd = False

    save_freq = 10000
    val_freq = 2500
    val_mesh_freq = 5000
    report_freq = 100

    igr_weight = 0.1
    mask_weight = 0.0
    depth_weight = 1.0
    normal_weight = 1.0

    use_masked_loss = False
    use_ssi_depth_loss = True

    phase_delim = [0.16667, 0.5]
    feat_weight = [0, 0.5, 0.05]
    bias_weight = [0.01, 0.1, 0.01]
    depth_from_inside_only = [False, True, True]
    object_mask_type = "zero_sdf_mask"
}

model {
    nerf {
        D = 8,
        d_in = 4,
        d_in_view = 3,
        W = 256,
        multires = 10,
        multires_view = 4,
        barf_c2f = [0.1,0.5],
        output_ch = 4,
        skips=[4],
        use_viewdirs=True
    }

    sdf_network {
        d_out = 257
        d_in = 3
        d_hidden = 256
        n_layers = 8
        skip_in = [4]
        multires = 6
        barf_c2f = [0.1,0.5]
        bias = 0.5
        scale = 3.0
        geometric_init = True
        weight_norm = True
    }

    variance_network {
        init_val = 0.3
    }

    rendering_network {
        d_feature = 256
        mode = idr
        d_in = 9
        d_out = 3
        d_hidden = 256
        n_layers = 4
        weight_norm = True
        multires_view = 4
        barf_c2f = [0.1,0.5]
        squeeze_out = True
    }

    neus_renderer {
        n_samples = 64
        n_importance = 64
        n_outside = 0
        up_sample_steps = 4     # 1 for simple coarse-to-fine sampling
        perturb = 1.0
    }
}
